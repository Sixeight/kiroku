<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kiroku</title>
    <link id="favicon" rel="icon" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/app.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script defer src="/static/app.js"></script>
  </head>
  <body>
    <main class="page">
      <div id="home-view">
        <header class="header">
          <h1>kiroku</h1>
          <div class="header-actions">
            <div class="theme-switcher">
              <button id="theme-toggle" class="action-icon has-tooltip" type="button" data-tooltip="Theme"><span class="theme-indicator"></span></button>
              <div id="theme-dropdown" class="theme-dropdown" hidden>
                <button class="theme-dot" data-theme="green" title="Green"></button>
                <button class="theme-dot" data-theme="blue" title="Blue"></button>
                <button class="theme-dot" data-theme="violet" title="Violet"></button>
                <button class="theme-dot" data-theme="amber" title="Amber"></button>
                <button class="theme-dot" data-theme="rose" title="Rose"></button>
              </div>
            </div>
            <button id="reindex-button" class="action-icon has-tooltip" type="button" data-tooltip="Reindex"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
          </div>
        </header>

        <div class="stats-bar">
          <div class="stat">
            <span>Sessions</span>
            <strong id="total-sessions">{{ .Summary.Totals.TotalSessions }}</strong>
          </div>
          <div class="stat">
            <span>Messages</span>
            <strong id="total-messages">{{ .Summary.Totals.TotalMessages }}</strong>
          </div>
          <div class="stat">
            <span>Output Tokens</span>
            <strong id="output-tokens">{{ .Summary.Analytics.TotalOutputTokens }}</strong>
          </div>
          <div class="stat">
            <span>Est. Cost</span>
            <strong id="total-cost">-</strong>
          </div>
        </div>

        <div id="usage-timeline" class="timeline" hidden></div>

        <nav id="project-filter" hidden></nav>
        <div id="project-summary" hidden></div>

        <div class="detail-section">
          <h3>Sessions
            <button id="session-sort-toggle" class="search-toggle" type="button">&#x2193; Newest</button>
            <button id="session-search-toggle" class="search-toggle" type="button"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="10" cy="10" r="7"/><line x1="15" y1="15" x2="21" y2="21"/></svg> Search</button>
          </h3>
          <div id="search-bar" class="conversation-search">
            <input id="search-input" class="search-input" type="text" placeholder="Search message content..." />
            <button class="search-clear" type="button" hidden onclick="document.getElementById('search-input').value='';document.getElementById('search-input').dispatchEvent(new Event('input'));this.hidden=true">&times;</button>
          </div>
          <div id="recent-sessions" class="session-list"></div>
        </div>
        <button id="load-more" class="load-more" type="button" hidden>Load more</button>
      </div>

      <div id="detail-view" hidden></div>
    </main>
  </body>
</html>
